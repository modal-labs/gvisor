openapi: 3.0.3
info:
  title: RDMA Job Agent
  description: |
    HTTP agent that spawns NCCL and PyTorch multi-node benchmark containers on
    a remote node. Designed for two-node RDMA/GPUDirect testing with gVisor.

    **Security:** Bind to loopback by default; reach via SSH -L or a VPN.
    Do not expose unauthenticated job execution on an untrusted network.
  version: 0.1.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://127.0.0.1:8756
    description: Default loopback binding

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Agent is running.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    example: true

  /v1/jobs:
    get:
      operationId: listJobs
      summary: List all jobs (brief view)
      responses:
        "200":
          description: Brief summary of every tracked job.
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobBrief"

    post:
      operationId: createJob
      summary: Create a benchmark job (NCCL or PyTorch)
      description: |
        Launches a Docker container running either an NCCL multi-node bench or a
        PyTorch torchrun allreduce bench. By default (`async: true`) the job is
        started in the background and a 202 is returned immediately; poll
        `GET /v1/jobs/{job_id}` for status. Set `async: false` to block until
        the container exits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/NcclJobRequest"
                - $ref: "#/components/schemas/TorchJobRequest"
              discriminator:
                propertyName: kind
                mapping:
                  nccl: "#/components/schemas/NcclJobRequest"
                  torch: "#/components/schemas/TorchJobRequest"
      responses:
        "200":
          description: Synchronous job completed successfully (`async: false`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJobResult"
        "202":
          description: Job accepted and running in background (default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncJobAccepted"
        "400":
          description: Invalid request (bad kind, missing fields, invalid JSON).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Synchronous job finished with an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/jobs/{job_id}:
    get:
      operationId: getJob
      summary: Get full job details
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Full job state including output, exit code, and timing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "400":
          description: |
            Invalid job ID (e.g. literal `null` or `undefined`, usually caused
            by unset shell variables when building the curl command).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found (unknown or evicted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/jobs/{job_id}/cancel:
    post:
      operationId: cancelJob
      summary: Cancel a running or queued job
      description: Sends SIGTERM to the job's container process.
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: SIGTERM sent.
          content:
            application/json:
              schema:
                type: object
                required: [ok, job_id, signal]
                properties:
                  ok:
                    type: boolean
                    example: true
                  job_id:
                    type: string
                    format: uuid
                  signal:
                    type: string
                    example: SIGTERM
        "400":
          description: Job is not in a cancelable state, or no process handle yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/nccl_topo:
    post:
      operationId: uploadNcclTopo
      summary: Upload NCCL topology XML
      description: |
        Accepts a raw XML body (the output of `NCCL_TOPO_DUMP_FILE`) and writes
        it atomically to the agent's topology path. The topology file is
        bind-mounted into runsc-rdma containers automatically.

        Max upload size: 10 MiB.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Topology written successfully.
          content:
            application/json:
              schema:
                type: object
                required: [ok, path, bytes]
                properties:
                  ok:
                    type: boolean
                    example: true
                  path:
                    type: string
                    description: Absolute path where the file was written.
                    example: /home/user/.cache/rdma_job_agent/nccl_topo.xml
                  bytes:
                    type: integer
                    description: Number of bytes written.
                  used_fallback_from:
                    type: string
                    description: |
                      Present only when the primary path was not writable and
                      the agent fell back to the default cache path.
                  note:
                    type: string
                    description: Human-readable note when a fallback was used.
        "400":
          description: Missing or short Content-Length.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Body exceeds 10 MiB limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Filesystem write error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/deploy_runsc:
    post:
      operationId: deployRunsc
      summary: Build and deploy the runsc-rdma runtime
      description: |
        Pulls the latest code from `origin/alessio/development`, builds `runsc`
        via `make copy`, installs it as `/usr/local/bin/runsc-rdma`, configures
        the Docker daemon, restarts Docker, and loads `nvidia-peermem`.

        Requires the agent to be running as root.

        By default (`async: true`) returns 202 immediately; poll the returned
        `job_id` for progress. The job object includes a `current_step` field
        and incremental `output` while running.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                async:
                  type: boolean
                  default: true
                  description: If false, block until the deploy completes.
      responses:
        "200":
          description: Synchronous deploy completed (`async: false`, success).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "202":
          description: Deploy job accepted (async).
          content:
            application/json:
              schema:
                type: object
                required: [job_id, async, kind]
                properties:
                  job_id:
                    type: string
                    format: uuid
                  async:
                    type: boolean
                    example: true
                  kind:
                    type: string
                    example: deploy_runsc
        "403":
          description: Agent is not running as root.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Synchronous deploy failed, or job disappeared.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/build_nccl_test:
    post:
      operationId: buildNcclTest
      summary: Build the nccl-test Docker image
      description: |
        Runs `docker build -f Dockerfile.nccl -t nccl-test .` from the repo
        root, then verifies with `docker image inspect nccl-test`.

        Requires the agent to be running as root.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                async:
                  type: boolean
                  default: true
                  description: If false, block until the build completes.
      responses:
        "200":
          description: Synchronous build completed (`async: false`, success).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "202":
          description: Build job accepted (async).
          content:
            application/json:
              schema:
                type: object
                required: [job_id, async, kind]
                properties:
                  job_id:
                    type: string
                    format: uuid
                  async:
                    type: boolean
                    example: true
                  kind:
                    type: string
                    example: build_nccl_test
        "403":
          description: Agent is not running as root.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Synchronous build failed, or job disappeared.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the job.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        hint:
          type: string

    JobBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        state:
          $ref: "#/components/schemas/JobState"
        kind:
          $ref: "#/components/schemas/JobKind"

    JobState:
      type: string
      enum: [queued, running, done, error]

    JobKind:
      type: string
      enum: [nccl, torch, deploy_runsc, build_nccl_test]

    JobDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/JobKind"
        state:
          $ref: "#/components/schemas/JobState"
        command:
          type: string
          description: Shell-quoted command that was executed.
        exit_code:
          type: integer
          nullable: true
          description: Process exit code (null while running).
        output:
          type: string
          description: Combined stdout+stderr of the container.
        error:
          type: string
          description: Error message (present when state is `error`).
        started_unix:
          type: number
          format: double
          description: Unix timestamp when the job started running.
        finished_unix:
          type: number
          format: double
          description: Unix timestamp when the job finished.
        current_step:
          type: string
          description: |
            For deploy/build jobs only — the command currently executing.
            Removed once the job finishes.
        steps:
          type: array
          description: For deploy/build jobs, the list of executed steps.
          items:
            $ref: "#/components/schemas/StepResult"
        repo_root:
          type: string
          description: For deploy/build jobs, the repo root used.

    StepResult:
      type: object
      properties:
        command:
          type: string
        cwd:
          type: string
          nullable: true
        exit_code:
          type: integer
        output:
          type: string

    EnvMap:
      type: object
      additionalProperties:
        type: string
      description: |
        Extra environment variables passed to the container
        (e.g. NCCL_DEBUG, NCCL_SOCKET_IFNAME, NCCL_IB_HCA).

    DockerRunCommon:
      type: object
      description: Fields shared by all job types that influence `docker run`.
      properties:
        runtime:
          type: string
          default: runc
          description: Docker runtime (e.g. `runc`, `runsc-rdma`).
        topo_host_path:
          type: string
          description: |
            Host path to the NCCL topology XML. Bind-mounted into
            runsc-rdma containers as `/topo.xml`.
        cgroup_parent:
          type: string
          description: Systemd slice / cgroup parent for the container.
        cpuset_cpus:
          type: string
          description: |
            CPU set restriction (e.g. `0-11`). Passed as
            `--cpuset-cpus` to Docker.
        async:
          type: boolean
          default: true
          description: |
            If true (default), return 202 immediately and run the job in
            the background. If false, block until the job finishes.
        env:
          $ref: "#/components/schemas/EnvMap"

    NcclJobRequest:
      allOf:
        - $ref: "#/components/schemas/DockerRunCommon"
        - type: object
          required: [kind, rank, nranks, master_addr, master_port]
          properties:
            kind:
              type: string
              enum: [nccl]
            rank:
              type: integer
              description: This node's rank (typically 1 for node B).
              example: 1
            nranks:
              type: integer
              description: Total number of ranks (nodes).
              example: 2
            ngpus:
              type: integer
              default: 8
              description: Number of GPUs per node.
            master_addr:
              type: string
              description: IP address of the rank-0 (master) node.
              example: "10.0.0.1"
            master_port:
              type: integer
              description: Port for NCCL bootstrap.
              example: 29501
            image:
              type: string
              default: nccl-test
              description: Docker image to use.
            bench_binary:
              type: string
              default: /usr/local/bin/nccl_multinode_bench
              description: Path to the benchmark binary inside the container.

    TorchJobRequest:
      allOf:
        - $ref: "#/components/schemas/DockerRunCommon"
        - type: object
          required: [kind, master_addr]
          properties:
            kind:
              type: string
              enum: [torch]
            master_addr:
              type: string
              description: IP address of the rank-0 (master) node.
              example: "10.0.0.1"
            master_port:
              type: integer
              default: 29541
              description: Port for torchrun rendezvous.
            nnodes:
              type: integer
              default: 2
              description: Total number of nodes.
            node_rank:
              type: integer
              default: 1
              description: This node's rank.
            nproc_per_node:
              type: integer
              default: 8
              description: Number of processes (GPUs) per node.
            image:
              type: string
              default: "nvcr.io/nvidia/pytorch:24.07-py3"
              description: Docker image to use.
            script_host_path:
              type: string
              default: /tmp/torch_allreduce_bench.py
              description: |
                Host path to the PyTorch benchmark script. Bind-mounted
                into the container as `/tmp/torch_allreduce_bench.py`.

    AsyncJobAccepted:
      type: object
      required: [job_id, async, command]
      properties:
        job_id:
          type: string
          format: uuid
        async:
          type: boolean
          example: true
        command:
          type: string
          description: Shell-quoted docker command that is running.

    SyncJobResult:
      type: object
      required: [job_id, exit_code, output, command]
      properties:
        job_id:
          type: string
          format: uuid
        exit_code:
          type: integer
        output:
          type: string
        command:
          type: string
